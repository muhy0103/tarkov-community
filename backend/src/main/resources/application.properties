spring.application.name=tarkov-community-backend
server.port=8080

management.endpoints.web.exposure.include=health,info

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tarkov_community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=-1

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

spring.mail.host=${MAIL_HOST:smtp.sina.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:nzdyhbzx@sina.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

app.email-verification.frontend-url=${APP_FRONTEND_URL:http://127.0.0.1:5173}
app.email-verification.from=${MAIL_FROM:nzdyhbzx@sina.com}
app.email-verification.enabled=${MAIL_ENABLED:true}
app.email-verification.dev-link-enabled=${MAIL_DEV_LINK_ENABLED:true}
app.email-verification.token-minutes=${MAIL_TOKEN_MINUTES:30}
